<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <title>ROBOT AR</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00f5ff; --orange: #ff6b2b; --dark: #0a0a0f;
      --panel: rgba(10,10,20,0.88); --border: rgba(0,245,255,0.25);
      --text: #c8e6ff; --font-mono: 'Share Tech Mono', monospace;
      --font-ui: 'Rajdhani', sans-serif;
    }
    html, body { width:100%; height:100%; background:var(--dark); overflow:hidden;
      font-family:var(--font-ui); color:var(--text);
      -webkit-tap-highlight-color:transparent; touch-action:none; }
    canvas { display:block; width:100%!important; height:100%!important; }
    #canvas-container { position:fixed; inset:0; z-index:0; }
    #canvas-container::after {
      content:''; position:absolute; inset:0; pointer-events:none; z-index:10;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    }
    /* HUD */
    #hud-top { position:fixed; top:0; left:0; right:0; z-index:20; padding:14px 20px 10px;
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent); }
    #logo { font-family:var(--font-mono); font-size:13px; color:var(--cyan);
      letter-spacing:.15em; text-shadow:0 0 12px var(--cyan); }
    #status-badge { font-family:var(--font-mono); font-size:11px; padding:4px 10px;
      border:1px solid var(--border); border-radius:2px; background:var(--panel);
      color:var(--cyan); display:flex; align-items:center; gap:6px; }
    #status-dot { width:6px; height:6px; border-radius:50%; background:#aaa; transition:background .3s; }
    #status-dot.active { background:var(--cyan); box-shadow:0 0 6px var(--cyan); }
    /* Stats */
    #stats-hud { position:fixed; top:60px; right:16px; z-index:20;
      font-family:var(--font-mono); font-size:10px; color:rgba(0,245,255,0.6);
      text-align:right; line-height:1.8; pointer-events:none; }
    .stat-label { color:rgba(0,245,255,0.35); }
    /* Corners */
    .corner { position:fixed; z-index:15; width:20px; height:20px; pointer-events:none; }
    .corner-tl { top:8px; left:8px; border-top:1px solid var(--cyan); border-left:1px solid var(--cyan); opacity:.4; }
    .corner-tr { top:8px; right:8px; border-top:1px solid var(--cyan); border-right:1px solid var(--cyan); opacity:.4; }
    .corner-bl { bottom:8px; left:8px; border-bottom:1px solid var(--cyan); border-left:1px solid var(--cyan); opacity:.4; }
    .corner-br { bottom:8px; right:8px; border-bottom:1px solid var(--cyan); border-right:1px solid var(--cyan); opacity:.4; }
    /* Joystick */
    #joystick-zone { position:fixed; bottom:24px; right:24px; z-index:30; touch-action:none; }
    #joystick-base { width:120px; height:120px; border-radius:50%;
      background:rgba(0,0,0,0.5); border:1.5px solid rgba(0,245,255,0.2);
      display:flex; align-items:center; justify-content:center; position:relative;
      backdrop-filter:blur(8px); }
    #joystick-thumb { width:44px; height:44px; border-radius:50%;
      background:radial-gradient(circle at 35% 35%,rgba(0,245,255,0.6),rgba(0,245,255,0.15));
      border:1.5px solid rgba(0,245,255,0.5); position:absolute;
      box-shadow:0 0 12px rgba(0,245,255,0.3); }
    /* Right controls */
    .ctrl-btn { font-family:var(--font-mono); font-size:11px; letter-spacing:.1em;
      color:var(--cyan); background:rgba(0,0,0,0.5); border:1.5px solid rgba(0,245,255,0.2);
      border-radius:4px; padding:9px 14px; cursor:pointer; backdrop-filter:blur(8px);
      transition:background .15s,border-color .15s; -webkit-user-select:none; user-select:none; }
    .ctrl-btn:active,.ctrl-btn.active { background:rgba(0,245,255,0.15); border-color:rgba(0,245,255,0.6); }
    /* Splash */
    #splash { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
      align-items:center; justify-content:center; background:var(--dark);
      padding:32px; transition:opacity .6s,visibility .6s; }
    #splash.hidden { opacity:0; visibility:hidden; }
    .splash-title { font-family:var(--font-mono); font-size:clamp(28px,8vw,48px);
      color:var(--cyan); letter-spacing:.1em;
      text-shadow:0 0 30px var(--cyan),0 0 60px rgba(0,245,255,0.3);
      margin-bottom:8px; text-align:center; }
    .splash-sub { font-size:13px; color:rgba(200,230,255,0.5); letter-spacing:.2em;
      text-transform:uppercase; margin-bottom:32px; font-family:var(--font-mono); }
    .splash-view { display:flex; flex-direction:column; align-items:center; width:100%; max-width:320px; }
    .splash-info { width:100%; margin-bottom:32px; }
    .info-row { display:flex; align-items:flex-start; gap:14px; padding:10px 0;
      border-bottom:1px solid rgba(0,245,255,0.08); font-size:14px;
      line-height:1.5; color:rgba(200,230,255,0.7); }
    .info-icon { font-size:18px; flex-shrink:0; margin-top:2px; }
    .btn-splash-primary { font-family:var(--font-mono); font-size:14px; letter-spacing:.15em;
      color:var(--dark); background:var(--cyan); border:none; padding:14px 0;
      border-radius:2px; cursor:pointer; text-transform:uppercase; width:100%;
      box-shadow:0 0 20px rgba(0,245,255,0.4); transition:box-shadow .2s,transform .1s; }
    .btn-splash-primary:active { transform:scale(0.97); }
    .btn-splash-sec { font-family:var(--font-mono); font-size:13px; letter-spacing:.1em;
      color:var(--cyan); background:none; border:1.5px solid rgba(0,245,255,0.25);
      padding:12px 0; border-radius:2px; cursor:pointer; width:100%; margin-top:12px; }
    .btn-splash-back { font-family:var(--font-mono); font-size:11px;
      color:rgba(200,230,255,0.3); background:none; border:none;
      cursor:pointer; margin-top:20px; letter-spacing:.1em; }
    #arena-picker { width:100%; display:flex; flex-direction:column; gap:10px; margin-top:18px; }
    .arena-card {
      width:100%; text-align:left; padding:14px 16px; cursor:pointer; border-radius:8px;
      border:1.5px solid rgba(0,245,255,0.14); background:rgba(0,0,0,0.32);
      transition:border-color .15s,transform .12s,box-shadow .15s,background .15s;
    }
    .arena-card.active {
      border-color:rgba(0,245,255,0.6); background:rgba(0,245,255,0.08);
      box-shadow:0 0 18px rgba(0,245,255,0.12);
    }
    .arena-card:active { transform:scale(0.985); }
    .arena-card-head {
      display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:6px;
    }
    .arena-card-name {
      font-family:var(--font-mono); font-size:12px; letter-spacing:.14em; color:var(--cyan);
    }
    .arena-card-tag {
      font-family:var(--font-mono); font-size:9px; letter-spacing:.12em; color:rgba(200,230,255,0.38);
      padding:3px 7px; border:1px solid rgba(200,230,255,0.12); border-radius:999px;
    }
    .arena-card-desc {
      font-size:12px; line-height:1.6; color:rgba(200,230,255,0.6);
    }
    #room-code-display { font-family:var(--font-mono); font-size:48px; letter-spacing:.45em;
      color:var(--cyan); text-shadow:0 0 30px var(--cyan),0 0 60px rgba(0,245,255,0.3);
      padding:16px 20px; border:1px solid rgba(0,245,255,0.2); border-radius:4px;
      margin:20px 0 28px; }
    #code-input { font-family:var(--font-mono); font-size:30px; letter-spacing:.45em;
      color:var(--cyan); background:rgba(0,0,0,0.5); border:1.5px solid rgba(0,245,255,0.35);
      border-radius:4px; padding:16px 8px; width:100%; text-align:center;
      text-transform:uppercase; outline:none; margin:20px 0 12px; caret-color:var(--cyan); }
    #code-input::placeholder { color:rgba(0,245,255,0.18); letter-spacing:.3em; }
    .mode-note { margin-top:0; margin-bottom:0; font-size:11px; font-family:var(--font-mono);
      color:rgba(200,230,255,0.3); text-align:center; max-width:280px; line-height:1.6; }

    /* ═══════════════════════════════════════════
       CUSTOMISEUR 3D
    ═══════════════════════════════════════════ */
    #splash { overflow-y:auto; -webkit-overflow-scrolling:touch; }
    #view-customize {
      position:fixed; inset:0; width:100%; max-width:none; padding:0; overflow:hidden;
      background:
        radial-gradient(circle at top, rgba(0,245,255,0.1), transparent 34%),
        radial-gradient(circle at bottom, rgba(255,119,51,0.1), transparent 32%),
        linear-gradient(180deg, #050810 0%, #08111b 45%, #04070d 100%);
    }
    #cust-box { position:relative; width:100%; height:100%; overflow:hidden; cursor:grab; flex-shrink:0; touch-action:none; }
    #cust-canvas { display:block; width:100%; height:100%; touch-action:none; }
    #cust-hint { position:absolute; bottom:22px; left:50%; transform:translateX(-50%); text-align:center;
      font-family:var(--font-mono); font-size:10px; color:rgba(220,245,255,0.55);
      letter-spacing:.14em; pointer-events:none; transition:opacity .25s,color .25s;
      padding:8px 14px; border:1px solid rgba(0,245,255,0.14); border-radius:999px;
      background:rgba(3,9,16,0.62); backdrop-filter:blur(10px); white-space:nowrap; }
    #cust-topbar { position:absolute; top:16px; left:16px; right:16px; z-index:2;
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px; pointer-events:none; }
    #cust-topbar > * { pointer-events:auto; }
    #btn-back-cust {
      align-self:flex-start; margin:0; background:rgba(3,10,18,0.68);
      border:1px solid rgba(0,245,255,0.18); border-radius:999px; padding:11px 16px;
      backdrop-filter:blur(10px);
    }
    #cust-right-ui { width:min(320px, calc(100vw - 32px)); display:flex; flex-direction:column; gap:10px; }
    #cust-stats { width:100%; display:flex; flex-direction:column; gap:7px;
      background:rgba(3,10,18,0.72); border:1px solid rgba(0,245,255,0.12); border-radius:18px;
      padding:14px 14px 12px; backdrop-filter:blur(12px); }
    .cust-stat-row { display:flex; align-items:center; gap:8px; }
    .cust-stat-label { font-family:var(--font-mono); font-size:9px;
      color:rgba(0,245,255,0.4); letter-spacing:.12em; width:62px; flex-shrink:0; }
    .cust-pips { display:flex; gap:3px; }
    .cust-pip { width:16px; height:5px; border-radius:2px;
      background:rgba(0,245,255,0.1); border:1px solid rgba(0,245,255,0.14); }
    .cust-pip.on { background:var(--cyan); border-color:var(--cyan); box-shadow:0 0 4px var(--cyan); }
    .cust-pip.on.warn { background:#ff9900; border-color:#ff9900; box-shadow:0 0 4px #ff9900; }
    #cust-colors { width:100%; display:flex; align-items:flex-start; gap:10px; }
    #cust-color-controls { flex:1; display:flex; flex-direction:column; gap:8px;
      background:rgba(3,10,18,0.72); border:1px solid rgba(0,245,255,0.12); border-radius:18px;
      padding:12px; backdrop-filter:blur(12px); }
    #btn-cust-colors {
      width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px;
      font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; color:var(--cyan);
      background:rgba(0,0,0,0.45); border:1.5px solid rgba(0,245,255,0.18); border-radius:12px;
      padding:10px 12px; cursor:pointer;
    }
    #cust-color-preview { display:flex; align-items:center; gap:7px; }
    .cust-color-dot {
      width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,0.55);
      box-shadow:0 0 8px rgba(255,255,255,0.08);
    }
    #cust-color-panel {
      background:rgba(0,0,0,0.35); border:1px solid rgba(0,245,255,0.12);
      border-radius:12px; padding:10px; display:flex; flex-direction:column; gap:10px;
    }
    #cust-color-panel.hidden { display:none; }
    #cust-color-targets { display:flex; gap:8px; }
    .cust-color-target {
      flex:1; font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; color:rgba(200,230,255,0.7);
      background:rgba(0,0,0,0.45); border:1px solid rgba(0,245,255,0.15); border-radius:8px;
      padding:9px 10px; cursor:pointer;
    }
    .cust-color-target.active { color:var(--cyan); border-color:rgba(0,245,255,0.45); background:rgba(0,245,255,0.08); }
    #cust-color-help {
      font-family:var(--font-mono); font-size:9px; letter-spacing:.08em; color:rgba(200,230,255,0.45);
      line-height:1.6;
    }
    #cust-color-swatches { display:flex; gap:7px; flex:1; flex-wrap:wrap; }
    .cust-swatch { width:22px; height:22px; border-radius:50%; cursor:pointer;
      border:2px solid transparent; flex-shrink:0;
      transition:transform .15s,border-color .15s,box-shadow .15s; }
    .cust-swatch.sel { border-color:#fff; transform:scale(1.2); }
    #cust-arrows {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:space-between;
      padding:0 16px; pointer-events:none; z-index:2;
    }
    #cust-arrows.hidden { display:none; }
    .cust-arrow {
      width:58px; height:58px; border-radius:50%; border:1px solid rgba(0,245,255,0.22);
      background:rgba(3,10,18,0.72); color:var(--cyan); font-size:26px; cursor:pointer;
      box-shadow:0 0 24px rgba(0,245,255,0.12); backdrop-filter:blur(10px); pointer-events:auto;
    }
    #cust-piece-chip {
      position:absolute; left:50%; top:86px; transform:translateX(-50%); z-index:2;
      min-width:200px; max-width:min(72vw, 360px); padding:10px 14px;
      border:1px solid rgba(0,245,255,0.16); border-radius:16px; background:rgba(3,10,18,0.72);
      backdrop-filter:blur(12px); text-align:center; pointer-events:none;
    }
    #cust-piece-chip.hidden { display:none; }
    #cust-piece-type { font-family:var(--font-mono); font-size:9px; letter-spacing:.18em; color:rgba(0,245,255,0.42); }
    #cust-piece-name { margin-top:4px; font-family:var(--font-mono); font-size:13px; color:var(--cyan); }
    #cust-piece-stats { margin-top:4px; font-size:10px; color:rgba(220,240,255,0.55); }
    @media (max-width: 720px) {
      #cust-topbar { flex-direction:column; align-items:stretch; }
      #cust-right-ui { width:100%; }
      #cust-piece-chip { top:88px; max-width:calc(100vw - 40px); }
      #cust-arrows { padding:0 10px; }
      .cust-arrow { width:50px; height:50px; }
      #cust-hint { bottom:16px; max-width:calc(100vw - 32px); white-space:normal; }
    }

    /* ── Jeu en cours ── */
    #game-controls { position:fixed; top:92px; right:16px; z-index:30;
      display:none; flex-direction:column; gap:8px; align-items:flex-end; }
    #btn-landscape { position:fixed; top:52px; left:16px; z-index:30; display:none;
      font-family:var(--font-mono); font-size:10px; letter-spacing:.1em;
      color:var(--cyan); background:rgba(0,0,0,0.5); border:1.5px solid rgba(0,245,255,0.2);
      border-radius:4px; padding:8px 10px; cursor:pointer; backdrop-filter:blur(8px);
      transition:background .15s,border-color .15s; -webkit-user-select:none; user-select:none; }
    #btn-landscape:active { background:rgba(0,245,255,0.15); border-color:rgba(0,245,255,0.6); }
    #btn-landscape.active { background:rgba(0,245,255,0.12); border-color:rgba(0,245,255,0.55); }
    #btn-attack { position:fixed; bottom:24px; left:24px; z-index:30; width:100px; height:100px;
      border-radius:50%; background:rgba(200,30,30,0.12); border:2px solid rgba(255,60,60,0.3);
      font-size:30px; color:rgba(255,80,60,0.85); cursor:pointer; display:none;
      align-items:center; justify-content:center; backdrop-filter:blur(8px);
      -webkit-user-select:none; user-select:none; transition:background .1s,border-color .1s,box-shadow .1s; }
    #btn-attack.ready { border-color:rgba(255,60,60,0.75); box-shadow:0 0 18px rgba(255,50,40,0.45); }
    #btn-attack.cooling { opacity:0.35; }
    #btn-attack:active { background:rgba(200,30,30,0.35); }
    #hp-enemy-wrap { position:fixed; top:52px; left:90px; right:16px; z-index:25;
      display:none; flex-direction:column; gap:3px; }
    #hp-me-wrap { position:fixed; bottom:16px; left:160px; right:160px; z-index:25;
      display:none; flex-direction:column; gap:3px; }
    .hp-bg { height:7px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden;
      position:relative; }
    .hp-fill { height:100%; border-radius:3px; width:100%; transition:width 0.25s ease-out; }
    #hp-fill-me { background:linear-gradient(90deg,#00cc55,#00ff88);
      box-shadow:0 0 6px rgba(0,255,136,0.5); }
    #hp-fill-enemy { background:linear-gradient(90deg,#cc2200,#ff4422);
      box-shadow:0 0 6px rgba(255,68,34,0.4); }
    .hp-label { font-family:var(--font-mono); font-size:9px; letter-spacing:.12em; }
    #hp-label-me { color:rgba(0,255,136,0.55); text-align:center; }
    #hp-label-enemy { color:rgba(255,68,34,0.55); text-align:center; }

    /* ── Mode paysage ── */
    /* Joystick → bas-gauche (position 4) */
    body.ls #joystick-zone { bottom:24px; right:auto; left:24px; }
    /* Bouton attaque → haut-gauche (position 1), sous le HUD */
    body.ls #btn-attack { bottom:auto; top:56px; left:16px; }
    /* Ma barre de vie → côté gauche entre 1 et 4 */
    body.ls #hp-me-wrap {
      bottom:auto; top:50%; left:16px; right:auto; transform:translateY(-50%);
      flex-direction:column; align-items:center; width:auto; gap:4px; }
    /* Barre vie adversaire → côté droit, à gauche des boutons */
    body.ls #hp-enemy-wrap {
      top:56px; left:auto; right:72px; transform:none;
      flex-direction:column; align-items:center; width:auto; gap:4px; }
    body.ls .hp-bg {
      height:clamp(100px,30vh,160px); width:8px; border-radius:3px; }
    body.ls .hp-fill {
      position:absolute; bottom:0; left:0; width:100% !important;
      border-radius:3px; transition:height .25s ease-out; }
    body.ls .hp-label { writing-mode:vertical-rl; font-size:8px; letter-spacing:.1em; }
    /* Boutons INVITE / QUITTER → bas-droit, pivotés 90° */
    body.ls #game-controls {
      bottom:24px; top:auto; right:16px; left:auto; transform:none;
      flex-direction:column; gap:8px; align-items:flex-end; }
    body.ls .ctrl-btn {
      writing-mode:vertical-rl; transform:none; }
    /* Bouton portrait/paysage → haut-droit, pivoté 90° */
    body.ls #btn-landscape {
      top:56px; right:16px; left:auto; transform:none;
      writing-mode:vertical-rl; }
  </style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div id="canvas-container"><canvas id="main-canvas"></canvas></div>

  <div id="hud-top">
    <div id="logo">ROBOT::AR</div>
    <div id="status-badge">
      <div id="status-dot"></div>
      <span id="status-text">INIT</span>
    </div>
  </div>

  <div id="stats-hud" style="display:none">
    <div><span class="stat-label">POS X </span><span id="stat-x">0.00</span></div>
    <div><span class="stat-label">POS Z </span><span id="stat-z">0.00</span></div>
    <div><span class="stat-label">ROT   </span><span id="stat-r">0°</span></div>
    <div><span class="stat-label">MODE  </span><span id="stat-mode">—</span></div>
    <div style="margin-top:5px;border-top:1px solid rgba(0,245,255,0.12);padding-top:5px;">
      <span class="stat-label">ROOM  </span><span id="stat-room">—</span>
    </div>
    <div><span class="stat-label">ONLINE</span><span id="stat-players">—</span></div>
  </div>

  <div id="joystick-zone">
    <div id="joystick-base"><div id="joystick-thumb"></div></div>
  </div>

  <button id="btn-landscape">↺ PAYSAGE</button>
  <button id="btn-attack"></button>

  <!-- HP bars -->
  <div id="hp-enemy-wrap">
    <div class="hp-label" id="hp-label-enemy">ADVERSAIRE</div>
    <div class="hp-bg"><div class="hp-fill" id="hp-fill-enemy"></div></div>
  </div>
  <div id="hp-me-wrap">
    <div class="hp-bg"><div class="hp-fill" id="hp-fill-me"></div></div>
    <div class="hp-label" id="hp-label-me">VIE</div>
  </div>

  <div id="game-controls">
    <button class="ctrl-btn" id="btn-reset-gyro">GYRO ↺</button>

            const group = new THREE.Group();
            group.name = 'front';
            group.userData.pieceType = 'front';
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.028,0.09), MAT.body.clone());
            arm.position.set(0,0.085,0.18); arm.userData.pieceType = 'front'; group.add(arm);
            const disc = new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,0.025,24), MAT.orange.clone());
            disc.rotation.z = Math.PI / 2;
            disc.position.set(0,0.095,0.28); disc.userData.pieceType = 'front'; group.add(disc);
            for (let i = 0; i < 8; i++) {
              const tooth = new THREE.Mesh(new THREE.BoxGeometry(0.016,0.032,0.012), MAT.accent.clone());
              const angle = (i / 8) * Math.PI * 2;
              tooth.position.set(0, 0.095 + Math.sin(angle) * 0.075, 0.28 + Math.cos(angle) * 0.075);
              tooth.userData.pieceType = 'front';
              group.add(tooth);

            return group;
          }

  };

  function calcMaxHP() {
    const w = PIECES.wheels.options[PIECES.wheels.current];
    const b = PIECES.body.options[PIECES.body.current];
    return Math.round(w.armor * b.armor * 100);
  }

  function saveRobotConfig() {
    try {
      localStorage.setItem(ROBOT_CONFIG_KEY, JSON.stringify({
        wheels: PIECES.wheels.current,
        body: PIECES.body.current,
        front: PIECES.front.current,
        color1: robotPrimaryColorId,
        color2: robotSecondaryColorId
      }));
    } catch (_) {}
  }

  function loadRobotConfig() {
    try {
      const raw = localStorage.getItem(ROBOT_CONFIG_KEY);
      if (!raw) return;
      const cfg = JSON.parse(raw);
      if (cfg.wheels && PIECES.wheels.options[cfg.wheels]) PIECES.wheels.current = cfg.wheels;
      if (cfg.body && PIECES.body.options[cfg.body]) PIECES.body.current = cfg.body;
      if (cfg.front && PIECES.front.options[cfg.front]) PIECES.front.current = cfg.front;
      if (cfg.color1 && COLOR_PRESETS.some(p => p.id === cfg.color1)) robotPrimaryColorId = cfg.color1;
      if (cfg.color2 && COLOR_PRESETS.some(p => p.id === cfg.color2)) robotSecondaryColorId = cfg.color2;
    } catch (_) {}
  }

  loadRobotConfig();

  const WHEEL_POSITIONS = [[-0.17,0.07,0.11],[0.17,0.07,0.11],[-0.17,0.07,-0.11],[0.17,0.07,-0.11]];

  function buildRobot() {
    if (robotGroup) scene.remove(robotGroup);
    robotGroup = new THREE.Group();
    robotGroup.name = 'robotRoot';

    // Capteur oeil (toujours présent, non sélectionnable)
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.18,.025,.01), MAT.accent.clone());
    eye.position.set(0,0.14,0.19); robotGroup.add(eye);

    // Corps
    const bodyGroup = PIECES.body.options[PIECES.body.current].build();
    robotGroup.add(bodyGroup);

    // Roues
    const wheelGroup = PIECES.wheels.options[PIECES.wheels.current].build(WHEEL_POSITIONS);
    robotGroup.add(wheelGroup);

    // Avant
    const frontGroup = PIECES.front.options[PIECES.front.current].build();
    robotGroup.add(frontGroup);

    robotGroup.position.set(robotPos.x, 0, robotPos.z);
    robotGroup.rotation.y = robotPos.ry;
    scene.add(robotGroup);
  }

  function swapPiece(pieceType, optionKey) {
    PIECES[pieceType].current = optionKey;
    saveRobotConfig();

    // Supprimer l'ancien groupe de cette pièce
    const old = robotGroup.getObjectByName(pieceType);
    if (old) robotGroup.remove(old);

    // Construire et ajouter le nouveau
    let newGroup;
    if (pieceType === 'wheels') {
      newGroup = PIECES.wheels.options[optionKey].build(WHEEL_POSITIONS);
    } else if (pieceType === 'body') {
      newGroup = PIECES.body.options[optionKey].build();
    } else {
      newGroup = PIECES.front.options[optionKey].build();
    }

    // Animation d'apparition : scale 0 → 1
    newGroup.scale.set(0,0,0);
    robotGroup.add(newGroup);
    animateScale(newGroup, 1, 0.3);
  }

  function animateScale(obj, target, duration) {
    const start = performance.now();
    function tick() {
      const t = Math.min((performance.now()-start)/(duration*1000),1);
      const ease = 1 - Math.pow(1-t,3);
      const s = ease * target;
      obj.scale.set(s,s,s);
      if(t<1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function buildRemoteRobot(data) {
    // Sauvegarde config locale
    const prev = { wheels: PIECES.wheels.current, body: PIECES.body.current, front: PIECES.front.current };
    const prevMat = MAT;
    PIECES.wheels.current = data.wheels || 'small';
    PIECES.body.current   = data.body   || 'square';
    PIECES.front.current  = data.front  || 'shovel';
    MAT = createMaterialSet(data.color1 || 'steel', data.color2 || 'cyan');

    const group = new THREE.Group();
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.18,.025,.01), MAT.accent.clone());
    eye.position.set(0,0.14,0.19); group.add(eye);
    group.add(PIECES.body.options[PIECES.body.current].build());
    group.add(PIECES.wheels.options[PIECES.wheels.current].build(WHEEL_POSITIONS));
    group.add(PIECES.front.options[PIECES.front.current].build());

    // Restaure config locale
    PIECES.wheels.current = prev.wheels;
    PIECES.body.current   = prev.body;
    PIECES.front.current  = prev.front;
    MAT = prevMat;

    group.position.set(data.x || 0, 0, data.z || 0);
    group.rotation.y = data.ry || 0;
    return group;
  }

  // ── Firebase sync ─────────────────────────────

  function publishPosition() {
    const now = Date.now();
    if (now - lastPublish < 66) return;
    lastPublish = now;
    const payload = {
      x: robotPos.x, z: robotPos.z, ry: robotPos.ry,
      wheels: PIECES.wheels.current, body: PIECES.body.current, front: PIECES.front.current,
      color1: robotPrimaryColorId, color2: robotSecondaryColorId,
      hp: myHP, maxHP: myMaxHP, ts: now
    };
    if (lastAttackPublished) {
      payload.atk = lastAttackPublished;
      lastAttackPublished = null;
    }
    db.ref('rooms/' + roomId + '/players/' + myId).set(payload);
  }

  function setupFirebase() {
    // Afficher le code de room
    $('stat-room').textContent = roomId;

    const playersRef = db.ref('rooms/' + roomId + '/players');

    playersRef.on('value', snap => {
      const all = snap.val() || {};

      // Supprimer les robots des joueurs partis
      Object.keys(remoteRobots).forEach(id => {
        if (!all[id]) { scene.remove(remoteRobots[id].group); delete remoteRobots[id]; }
      });

      // Ajouter / mettre à jour les robots distants
      Object.entries(all).forEach(([id, p]) => {
        if (id === myId) return;
        if (!remoteRobots[id]) {
          const group = buildRemoteRobot(p);
          remoteRobots[id] = { group, targetX: p.x, targetZ: p.z, targetRy: p.ry,
                               lerpX: p.x, lerpZ: p.z, pushOffX: 0, pushOffZ: 0,
                               wheels: p.wheels, body: p.body, front: p.front,
                               color1: p.color1 || 'steel', color2: p.color2 || 'cyan',
                               jumpY: 0, jumpVel: 0,
                               hp: p.hp ?? 100, maxHP: p.maxHP ?? 100, lastAtkT: 0 };
          scene.add(group);
          updateHPBars();
        } else {
          const r = remoteRobots[id];
          r.targetX = p.x; r.targetZ = p.z; r.targetRy = p.ry;
          // Reconstruire si les pièces ont changé
          if (r.wheels !== p.wheels || r.body !== p.body || r.front !== p.front
              || r.color1 !== (p.color1 || 'steel') || r.color2 !== (p.color2 || 'cyan')) {
            const px = r.group.position.x, pz = r.group.position.z, pry = r.group.rotation.y;
            scene.remove(r.group);
            r.group = buildRemoteRobot(p);
            r.group.position.set(px, 0, pz); r.group.rotation.y = pry;
            r.wheels = p.wheels; r.body = p.body; r.front = p.front;
            r.color1 = p.color1 || 'steel'; r.color2 = p.color2 || 'cyan';
            scene.add(r.group);
          }
          // Check attack hit
          if (p.atk && p.atk.t !== r.lastAtkT && !gameOver) {
            r.lastAtkT = p.atk.t;
            const dx = robotPos.x - r.lerpX;
            const dz = robotPos.z - r.lerpZ;
            if (Math.sqrt(dx*dx + dz*dz) < ATTACK_RANGE) {
              myHP = Math.max(0, myHP - p.atk.dmg);
              updateHPBars();
              if (myHP <= 0) endGame(false);
            }
          }
          // Enemy HP
          r.hp = p.hp ?? r.hp;
          r.maxHP = p.maxHP ?? r.maxHP;
          if (r.hp <= 0 && !gameOver) endGame(true);
          updateHPBars();
        }
      });

      $('stat-players').textContent = Object.keys(all).length + '/2';
    });

    // Nettoyage à la déconnexion
    db.ref('rooms/' + roomId + '/players/' + myId).onDisconnect().remove();
    window.addEventListener('beforeunload', () => {
      db.ref('rooms/' + roomId + '/players/' + myId).remove();
    });
  }

  function updateHPBars() {
    const myPct  = myMaxHP > 0 ? (myHP / myMaxHP * 100) : 0;
    const fillMe = $('hp-fill-me');
    if (landscapeMode) {
      fillMe.style.width = '100%'; fillMe.style.height = myPct + '%';
    } else {

  async function requestGyro() {
    if (typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function') {
      const overlay = document.createElement('div');
      overlay.style.cssText='position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,15,0.93);gap:16px;padding:32px;';
      overlay.innerHTML=`
        <div style="font-family:'Share Tech Mono',monospace;color:#00f5ff;font-size:13px;letter-spacing:.15em;">ACCÈS GYROSCOPE</div>
        <div style="font-size:13px;color:rgba(200,230,255,0.6);text-align:center;line-height:1.7;max-width:260px;">iOS nécessite votre autorisation pour la vue orbitale autour du robot.</div>
        <button id="btn-gyro-ok" style="font-family:'Share Tech Mono',monospace;font-size:13px;color:#0a0a0f;background:#00f5ff;border:none;padding:13px 36px;border-radius:2px;cursor:pointer;box-shadow:0 0 18px rgba(0,245,255,0.4);">[ AUTORISER ]</button>
        <button id="btn-gyro-skip" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(200,230,255,0.35);background:none;border:none;cursor:pointer;">passer sans gyroscope</button>
      `;
      document.body.appendChild(overlay);
      await new Promise(resolve=>{
        document.getElementById('btn-gyro-ok').addEventListener('click',async()=>{
          try {
            if(await DeviceOrientationEvent.requestPermission()==='granted'){
              window.addEventListener('deviceorientation',onGyro,true);
              setStatus('GYRO OK','active');
            }
          } catch(e){}
          overlay.remove(); resolve();
        });
        document.getElementById('btn-gyro-skip').addEventListener('click',()=>{overlay.remove();resolve();});
      });
    } else if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation',onGyro,true);
    }
  }

  function onGyro(e) {
    if (e.alpha === null || e.beta === null || e.gamma === null) return;
    gyroActive = true;

    const a = THREE.MathUtils.degToRad(e.alpha);
    const b = THREE.MathUtils.degToRad(e.beta);
    const g = THREE.MathUtils.degToRad(e.gamma);

    // Quaternion standard DeviceOrientation → espace monde Three.js
    // Ordre 'YXZ' + correction -90° X (screen-up → screen-forward)
    _gyroEul.set(b, a, -g, 'YXZ');
    _devQuat.setFromEuler(_gyroEul);
    _devQuat.multiply(_qCorrect);

    // Correction orientation écran (portrait=0°, landscape=90°…)
    const orient = THREE.MathUtils.degToRad(window.screen?.orientation?.angle || 0);
    _qScreen.setFromAxisAngle(_zee, -orient);
    _devQuat.multiply(_qScreen);

    // Mémoriser l'orientation de départ → rotation relative
    if (_baseInv === null) _baseInv = _devQuat.clone().invert();
    camera.quaternion.multiplyQuaternions(_devQuat, _baseInv);

    // Extraire le yaw horizontal pour le déplacement du robot
    _gyroEul.setFromQuaternion(camera.quaternion, 'YXZ');
    camYaw = _gyroEul.y;
  }

  function recenterGyro() {
    if (!gyroActive) return;
    _baseInv = _devQuat.clone().invert();
    setStatus('GYRO CENTRE','active');
  }

  // ═══════════════════════════════════════════════
  //  MAIN LOOP
  // ═══════════════════════════════════════════════

  function onFrame(time, frame) {
    clock.getDelta();

    // Déplacement + orientation robot
    if(robotPlaced){
      const jLen = Math.sqrt(move.x*move.x + move.z*move.z);

      const effSpeed = SPEED
        * PIECES.wheels.options[PIECES.wheels.current].speed
        * PIECES.body.options[PIECES.body.current].speed;

      if (landscapeMode && jLen > 0.05) {
        // Mode paysage : même logique qu'en portrait, axes pivotés 90°
        // le haut (move.z négatif) devient la gauche, la droite devient l'avant
        const lx = move.z;   // portrait haut/bas  → paysage gauche/droite
        const lz = -move.x;  // portrait gauche/droite → paysage avant/arrière
        const wx = Math.cos(camYaw)*lx + Math.sin(camYaw)*lz;
        const wz = -Math.sin(camYaw)*lx + Math.cos(camYaw)*lz;
        robotPos.x += wx * effSpeed;
        robotPos.z += wz * effSpeed;
        const targetRy = Math.atan2(wx, wz);
        const da = Math.atan2(Math.sin(targetRy - robotPos.ry), Math.cos(targetRy - robotPos.ry));
        robotPos.ry += da * ROT_SMOOTH;
      } else if (move.rotY !== 0) {
        // Boutons ROT : rotation manuelle sans déplacement
        robotPos.ry += move.rotY * ROT_SPEED;
      } else if (jLen > 0.05) {
        // Joystick : direction relative à la caméra (yaw uniquement)
        const wx = Math.cos(camYaw)*move.x + Math.sin(camYaw)*move.z;
        const wz = -Math.sin(camYaw)*move.x + Math.cos(camYaw)*move.z;

        robotPos.x += wx * effSpeed;
        robotPos.z += wz * effSpeed;

        // Orienter le robot vers la direction de déplacement (smooth)
        const targetRy = Math.atan2(wx, wz);
        const da = Math.atan2(Math.sin(targetRy - robotPos.ry), Math.cos(targetRy - robotPos.ry));
        robotPos.ry += da * ROT_SMOOTH;
      }

      // Appliquer vélocité de poussée (décroît chaque frame)
      robotPos.x += pushVelX;
      robotPos.z += pushVelZ;
      pushVelX *= PUSH_DECAY;
      pushVelZ *= PUSH_DECAY;

      // Collision murs de l'arène
      const limit = ARENA - 0.32;
      robotPos.x = THREE.MathUtils.clamp(robotPos.x, -limit, limit);
      robotPos.z = THREE.MathUtils.clamp(robotPos.z, -limit, limit);

      // Collision robot-robot : impulsion + saut
      const COLL_D = ROBOT_RADIUS * 2;
      Object.values(remoteRobots).forEach(r => {
        const dx = robotPos.x - r.lerpX;
        const dz = robotPos.z - r.lerpZ;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < COLL_D && dist > 0.001) {
          const nx = dx / dist, nz = dz / dist;
          // Impulsion sur le robot local (direction de séparation)
          pushVelX = nx * PUSH_STRENGTH;
          pushVelZ = nz * PUSH_STRENGTH;
          // Saut local (seulement si au sol)
          if (jumpY <= 0.001 && jumpVel <= 0) jumpVel = JUMP_INIT_VEL;
          // Pop visuel sur le robot distant + son saut
          r.pushOffX = -nx * 0.30;
          r.pushOffZ = -nz * 0.30;
          if (r.jumpY <= 0.001 && r.jumpVel <= 0) r.jumpVel = JUMP_INIT_VEL;
        }
      });

      // Physique de saut local
      if (jumpVel > 0 || jumpY > 0) {
        jumpVel -= GRAVITY;
        jumpY = Math.max(0, jumpY + jumpVel);
        if (jumpY <= 0) { jumpY = 0; jumpVel = 0; }
      }

      // Attack animation
      if (attackAnim) {
        const el = Date.now() - attackAnim.t0;
        if (attackAnim.phase === 'out') {
          const t = Math.min(1, el / 80);
          attackAnim.group.position.z = attackAnim.origZ + 0.2 * (1 - Math.pow(1-t, 2));
          if (t >= 1) { attackAnim.phase = 'in'; attackAnim.t0 = Date.now(); }
        } else {
          const t = Math.min(1, el / 160);
          attackAnim.group.position.z = attackAnim.origZ + 0.2 * (1 - t);
          if (t >= 1) { attackAnim.group.position.z = attackAnim.origZ; attackAnim = null; }
        }
      }

      robotGroup.position.x = robotPos.x;
      robotGroup.position.y = jumpY;
      robotGroup.position.z = robotPos.z;
      robotGroup.rotation.y = robotPos.ry;

      // Animer les roues
      const spd = Math.sqrt(move.x*move.x + move.z*move.z);
      const wGroup = robotGroup.getObjectByName('wheels');
      if(wGroup) wGroup.traverse(c=>{ if(c.isMesh&&c.geometry?.type==='CylinderGeometry') c.rotation.x+=spd*.15; });

      $('stat-x').textContent=robotPos.x.toFixed(2);
      $('stat-z').textContent=robotPos.z.toFixed(2);
      $('stat-r').textContent=Math.round(THREE.MathUtils.radToDeg(robotPos.ry)%360)+'°';
    }

    // Caméra fixe — position constante, rotation gérée par onGyro()
    if(mode==='3d'){
      camera.position.set(CAM_FIXED.x, CAM_FIXED.y, CAM_FIXED.z);
      // Si pas de gyro actif : regarder le robot (lookAt statique)
      if (!gyroActive) camera.lookAt(robotPos.x, 0.2, robotPos.z);
    }

    // Publier position + interpoler robots distants
    if (robotPlaced) publishPosition();
    Object.values(remoteRobots).forEach(r => {
      r.lerpX += (r.targetX - r.lerpX) * 0.25;
      r.lerpZ += (r.targetZ - r.lerpZ) * 0.25;
      const dRy = Math.atan2(Math.sin(r.targetRy - r.group.rotation.y), Math.cos(r.targetRy - r.group.rotation.y));
      r.group.rotation.y += dRy * 0.25;
      r.pushOffX *= PUSH_DECAY;
      r.pushOffZ *= PUSH_DECAY;
      // Physique de saut distant
      if (r.jumpVel > 0 || r.jumpY > 0) {
        r.jumpVel -= GRAVITY;
        r.jumpY = Math.max(0, r.jumpY + r.jumpVel);
        if (r.jumpY <= 0) { r.jumpY = 0; r.jumpVel = 0; }
      }
      r.group.position.set(r.lerpX + r.pushOffX, r.jumpY, r.lerpZ + r.pushOffZ);
    });

    renderer.render(scene, camera);
  }

  let custRenderer = null, custScene = null, custCamera = null;
  let custRobotGroup = null;
  let custOrbit = { azimuth: 0.5, elevation: 0.35, distance: 1.8 };
  let custSelectedPiece = null;

  // ── Tween engine ─────────────────────────────
  const _custTweens = [];
  function custTweenTo(target, props, dur, onDone) {
    for (let i = _custTweens.length - 1; i >= 0; i--) {
      const tw = _custTweens[i];
      if (tw.target === target && Object.keys(props).some(k => k in tw.end)) _custTweens.splice(i, 1);
    }
    const start = {};
    for (const k in props) start[k] = target[k];
    _custTweens.push({ target, start, end: { ...props }, t0: performance.now(), dur, onDone });
  }
  function tickCustTweens() {
    const now = performance.now();
    for (let i = _custTweens.length - 1; i >= 0; i--) {
      const tw = _custTweens[i];
      const t = Math.min(1, (now - tw.t0) / tw.dur);
      const e = 1 - (1 - t) * (1 - t) * (1 - t);
      for (const k in tw.end) tw.target[k] = tw.start[k] + (tw.end[k] - tw.start[k]) * e;
      if (t >= 1) { _custTweens.splice(i, 1); tw.onDone?.(); }
    }
  }

    custScene.add(fillCust);
    const warm = new THREE.PointLight(0xff7733, 0.5, 8, 2);
    warm.position.set(0, 1.4, 1.8);
    custScene.add(warm);

    const plat = new THREE.Mesh(
      new THREE.CylinderGeometry(0.78, 0.9, 0.08, 56),

    );
    plat.position.y = -0.04;
    plat.receiveShadow = true;
    custScene.add(plat);
    const rim = new THREE.Mesh(
      new THREE.TorusGeometry(0.78, 0.016, 8, 72),
      new THREE.MeshStandardMaterial({ color:0x00f5ff, emissive:0x00f5ff, emissiveIntensity:.42, metalness:.85, roughness:.18 })
    );
    rim.rotation.x = Math.PI / 2;

    custScene.add(rim);
    const halo = new THREE.Mesh(
      new THREE.CircleGeometry(1.45, 48),
      new THREE.MeshBasicMaterial({ color:0x0d2230, transparent:true, opacity:.35 })
    );
    halo.rotation.x = -Math.PI / 2;
    halo.position.y = -0.039;
    custScene.add(halo);

    function custResize() {
      const box = $('cust-box');
      const w = box.clientWidth || window.innerWidth || 300;
      const h = box.clientHeight || window.innerHeight || 300;
      custRenderer.setSize(w, h);
      custCamera.aspect = w / h;
      custCamera.updateProjectionMatrix();
    }
    custResize();
    window.addEventListener('resize', custResize);

    initMaterials();
    buildCustRobot();
    custUpdateCamera();
    renderColorUI();
    updateStats();
    updateCustSelectionUI();
    startCustLoop();

    const drag = { on: false, moved: false, x0: 0, y0: 0, x: 0, y: 0, mode: null, swipeCarry: 0 };
    canvas.addEventListener('pointerdown', e => {
      drag.on = true;
      drag.moved = false;
      drag.mode = null;
      drag.swipeCarry = 0;
      drag.x0 = drag.x = e.clientX;
      drag.y0 = drag.y = e.clientY;
      custLastInteraction = Date.now();
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', e => {
      if (!drag.on || custSwapping) return;
      const dx = e.clientX - drag.x;
      const dy = e.clientY - drag.y;
      const totalX = e.clientX - drag.x0;
      const totalY = e.clientY - drag.y0;
      drag.x = e.clientX;
      drag.y = e.clientY;
      if (Math.abs(totalX) > 5 || Math.abs(totalY) > 5) drag.moved = true;
      if (!drag.moved) return;

      if (!drag.mode) {
        if (custSelectedPiece && Math.abs(totalX) > 12 && Math.abs(totalX) > Math.abs(totalY) * 1.15) drag.mode = 'cycle';
        else drag.mode = 'orbit';
      }

      custLastInteraction = Date.now();
      if (drag.mode === 'cycle' && custSelectedPiece) {
        drag.swipeCarry += dx;
        while (drag.swipeCarry <= -CUST_SWIPE_STEP) {
          drag.swipeCarry += CUST_SWIPE_STEP;
          cycleCustPiece(1);
        }
        while (drag.swipeCarry >= CUST_SWIPE_STEP) {
          drag.swipeCarry -= CUST_SWIPE_STEP;
          cycleCustPiece(-1);
        }
      } else {
        custOrbit.azimuth -= dx * 0.013;
        custOrbit.elevation = Math.max(-0.25, Math.min(1.1, custOrbit.elevation + dy * 0.009));
        custUpdateCamera();
      }
    });
    canvas.addEventListener('pointerup', e => {
      if (!drag.moved) onCustTap(e.clientX, e.clientY);
      drag.on = false;
      drag.mode = null;
      drag.swipeCarry = 0;
    });
    canvas.addEventListener('pointercancel', () => {
      drag.on = false;
      drag.mode = null;
      drag.swipeCarry = 0;
    });

    let pinch0 = 0;
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        pinch0 = Math.sqrt(dx * dx + dy * dy);
      }
    }, { passive: true });
    canvas.addEventListener('touchmove', e => {
      if (e.touches.length !== 2 || !pinch0) return;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d = Math.sqrt(dx * dx + dy * dy);
      custOrbit.distance = Math.max(0.9, Math.min(3.2, custOrbit.distance * pinch0 / d));
      pinch0 = d;
      custLastInteraction = Date.now();
      custUpdateCamera();
    }, { passive: true });
    canvas.addEventListener('touchend', () => { pinch0 = 0; }, { passive: true });

    $('cust-arrow-prev').addEventListener('click', () => cycleCustPiece(-1));
    $('cust-arrow-next').addEventListener('click', () => cycleCustPiece(1));
    $('btn-cust-colors').addEventListener('click', () => {
      custColorMenuOpen = !custColorMenuOpen;
      renderColorUI();
    });
    $('btn-color-primary').addEventListener('click', () => {
      custColorTarget = 'primary';
      renderColorUI();
    });
    $('btn-color-secondary').addEventListener('click', () => {
      custColorTarget = 'secondary';
      renderColorUI();
    });
  }

  function startCustLoop() {
    custRunning = true;
    const gen = ++custLoopGen;
    (function loop() {
      if (custLoopGen !== gen || !custRunning) return;
      tickCustTweens();
      if (custBobActive && custSelectedGroup) {
        custSelectedGroup.position.y = custBobBase + Math.sin(Date.now() * 0.003) * 0.018;
      }
      if (custRobotGroup && !custSelectedPiece && Date.now() - custLastInteraction > 2200) {
        custOrbit.azimuth += 0.005;
        custUpdateCamera();
      }
      custRenderer.render(custScene, custCamera);
      requestAnimationFrame(loop);
    })();
  }

  function attachSelectedGroup(cb) {
    custBobActive = false;
    const g = custSelectedGroup;
    if (g) {
      custTweenTo(g.position, { y: 0 }, 220, () => {
        custSelectedPiece = null;
        custSelectedGroup = null;
        buildCustRobot();
        updateCustSelectionUI();
        cb?.();
      });
    } else {
      custSelectedPiece = null;
      custSelectedGroup = null;
      buildCustRobot();
      updateCustSelectionUI();
      cb?.();
    }
  }

  function selectCustPiece(pieceType) {
    custLastInteraction = Date.now();
    custSelectedPiece = pieceType;
    const keys = getCustOptionKeys(pieceType);
    custChoiceIndex = Math.max(0, keys.indexOf(PIECES[pieceType].current));
    custBobActive = false;
    custBobBase = 0.15;
    buildCustRobot();
    custSelectedGroup = custRobotGroup.children.find(c => c.name === pieceType) || null;
    if (custSelectedGroup) {
      custTweenTo(custSelectedGroup.position, { y: 0.15 }, 220, () => {
        custBobActive = true;
        custBobBase = 0.15;
      });
    }
    updateCustSelectionUI();
  }

  function applyCustPiecePreview(pieceType, key, animate = true) {
    if (custSwapping || !pieceType) return;
    custChoiceIndex = Math.max(0, getCustOptionKeys(pieceType).indexOf(key));
    if (PIECES[pieceType].current === key) {
      updateCustSelectionUI();
      updateStats();
      return;
    }

    const finalize = () => {
      PIECES[pieceType].current = key;
      saveRobotConfig();
      buildCustRobot();
      custSelectedGroup = custRobotGroup.children.find(c => c.name === pieceType) || null;
      if (custSelectedGroup) {
        custSelectedGroup.position.y = 0.24;
        custSelectedGroup.scale.set(0.001, 0.001, 0.001);
        custTweenTo(custSelectedGroup.position, { y: 0.15 }, 260, null);
        custTweenTo(custSelectedGroup.scale, { x: 1, y: 1, z: 1 }, 260, () => {
          custSwapping = false;
          custBobActive = true;
          custBobBase = 0.15;
          updateStats();
          updateCustSelectionUI();
        });
      } else {
        custSwapping = false;
        updateStats();
        updateCustSelectionUI();
      }
    };

    if (!animate) {
      finalize();
      return;
    }

    custSwapping = true;
    custBobActive = false;
    const flyGroup = custSelectedGroup || custRobotGroup?.children.find(c => c.name === pieceType);
    if (!flyGroup) {
      finalize();
      return;
    }
    custTweenTo(flyGroup.position, { y: 0.55 }, 180, null);
    custTweenTo(flyGroup.scale, { x: 0.001, y: 0.001, z: 0.001 }, 180, finalize);
  }

  function cycleCustPiece(dir) {
    if (!custSelectedPiece || custSwapping) return;
    custLastInteraction = Date.now();
    const keys = getCustOptionKeys(custSelectedPiece);
    if (!keys.length) return;
    custChoiceIndex = (custChoiceIndex + dir + keys.length) % keys.length;
    applyCustPiecePreview(custSelectedPiece, keys[custChoiceIndex], true);
  }

  function custUpdateCamera() {
    const az = custOrbit.azimuth, el = custOrbit.elevation, d = custOrbit.distance;
    custCamera.position.set(
      d * Math.sin(az) * Math.cos(el),
      d * Math.sin(el) + 0.18,
      d * Math.cos(az) * Math.cos(el)
    );
    custCamera.lookAt(0, 0.18, 0);
  }

  function buildCustRobot() {
    if (custRobotGroup) custScene.remove(custRobotGroup);
    custRobotGroup = new THREE.Group();

    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.18, .025, .01), MAT.accent.clone());
    eye.position.set(0, 0.14, 0.19);
    eye.userData.pieceType = 'eye';
    eye.castShadow = true;
    custRobotGroup.add(eye);
    custRobotGroup.add(PIECES.body.options[PIECES.body.current].build());
    custRobotGroup.add(PIECES.wheels.options[PIECES.wheels.current].build(WHEEL_POSITIONS));
    custRobotGroup.add(PIECES.front.options[PIECES.front.current].build());

    custRobotGroup.traverse(o => { if (o.isMesh) o.castShadow = true; });

    if (custSelectedPiece) {
      const hlMat = new THREE.MeshStandardMaterial({
        color: 0x00f5ff, emissive: 0x00f5ff, emissiveIntensity: .9,
        metalness: .88, roughness: .08, transparent: true, opacity: .88
      });
      custRobotGroup.traverse(o => {
        if (!o.isMesh || o.userData.pieceType !== custSelectedPiece) return;
        if (o.material?.color?.getHex?.() === 0x111111) return;
        o.material = hlMat.clone();
      });
    }
    custScene.add(custRobotGroup);
    if (custSelectedPiece) {
      custSelectedGroup = custRobotGroup.children.find(c => c.name === custSelectedPiece) || null;
      if (custSelectedGroup) custSelectedGroup.position.y = custBobBase || 0.15;
    }
  }

  function onCustTap(cx, cy) {
    if (!custRobotGroup || custSwapping) return;
    const canvas = $('cust-canvas');
    const rect = canvas.getBoundingClientRect();
    const tx = ((cx - rect.left) / rect.width) * 2 - 1;
    const ty = -((cy - rect.top) / rect.height) * 2 + 1;
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(tx, ty), custCamera);
    const hits = ray.intersectObject(custRobotGroup, true);

    if (!hits.length) {
      if (custSelectedPiece) attachSelectedGroup();
      return;
    }
    const pt = hits[0].object.userData.pieceType;
    if (!pt || pt === 'eye') {
      if (custSelectedPiece) attachSelectedGroup();
      return;
    }

    if (custSelectedPiece === pt) return;
    if (custSelectedPiece) attachSelectedGroup(() => selectCustPiece(pt));
    else selectCustPiece(pt);
  }

  function updateStats() {
    const w = PIECES.wheels.options[PIECES.wheels.current];
    const b = PIECES.body.options[PIECES.body.current];
    const f = PIECES.front.options[PIECES.front.current];
    const speedPips = Math.max(1, Math.round(w.speed * b.speed / 1.54 * 4) + 1);
    const hpPips = Math.max(1, Math.round(w.armor * b.armor / 1.52 * 4) + 1);
    const dmgPips = Math.max(1, Math.min(5, Math.round(f.attack / 1.3 * 5)));
    const cadencePips = Math.max(1, Math.min(5, Math.round((1 - (f.cooldownMs - 780) / 470) * 4) + 1));
    renderPips('stat-speed', Math.min(5, speedPips), false);
    renderPips('stat-hp', Math.min(5, hpPips), hpPips <= 1);
    renderPips('stat-dmg', dmgPips, false);
    renderPips('stat-rate', cadencePips, false);
  }

  function renderPips(id, count, warn) {
    const el = $(id);
    if (!el) return;
    el.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const p = document.createElement('div');
      p.className = 'cust-pip' + (i < count ? (warn ? ' on warn' : ' on') : '');
      el.appendChild(p);
    }
  }

  function renderColorSwatches() {
    const container = $('cust-color-swatches');
    if (!container) return;
    container.innerHTML = '';
    COLOR_PRESETS.forEach(preset => {
      const sw = document.createElement('div');
      const selectedId = custColorTarget === 'primary' ? robotPrimaryColorId : robotSecondaryColorId;
      sw.className = 'cust-swatch' + (preset.id === selectedId ? ' sel' : '');
      sw.style.background = preset.hex;
      sw.style.boxShadow = preset.id === selectedId ? `0 0 7px ${preset.hex}` : 'none';
      sw.title = preset.id;
      sw.addEventListener('click', () => {
        if (custSwapping) return;
        if (custColorTarget === 'primary') robotPrimaryColorId = preset.id;
        else robotSecondaryColorId = preset.id;
        saveRobotConfig();
        initMaterials();
        buildCustRobot();
        updateCustSelectionUI();
        renderColorUI();
      });
      container.appendChild(sw);
    });
  }

  function renderColorUI() {
    const primary = getColorPreset(robotPrimaryColorId);
    const secondary = getColorPreset(robotSecondaryColorId);
    const panel = $('cust-color-panel');
    const btn = $('btn-cust-colors');
    if (panel) panel.classList.toggle('hidden', !custColorMenuOpen);
    if (btn && btn.firstElementChild) btn.firstElementChild.textContent = custColorMenuOpen ? 'FERMER LE MENU' : 'OUVRIR LE MENU';
    if ($('cust-color1-dot')) $('cust-color1-dot').style.background = primary.hex;
    if ($('cust-color2-dot')) $('cust-color2-dot').style.background = secondary.hex;
    if ($('btn-color-primary')) $('btn-color-primary').classList.toggle('active', custColorTarget === 'primary');
    if ($('btn-color-secondary')) $('btn-color-secondary').classList.toggle('active', custColorTarget === 'secondary');
    if ($('cust-color-help')) {
      $('cust-color-help').textContent = custColorTarget === 'primary'
        ? 'COULEUR 1 : applique la couleur principale aux grosses pieces du robot.'
        : 'COULEUR 2 : applique la couleur des accents et elements lumineux.';
    }
    renderColorSwatches();
  }

  // ── Joystick ──────────────────────────────────
  const jBase=$('joystick-base'), jThumb=$('joystick-thumb');
  const JR=38; let jActive=false, jId=null, jOrigin={x:0,y:0};

  function jStart(e){
    const t=e.changedTouches?e.changedTouches[0]:e;
    jActive=true; jId=t.identifier??0;
    const r=jBase.getBoundingClientRect();
    jOrigin={x:r.left+r.width/2,y:r.top+r.height/2};
    jMove(e);
  }
  function jMove(e){
    if(!jActive) return;
    const t=e.changedTouches?Array.from(e.changedTouches).find(t=>t.identifier===jId)||e.changedTouches[0]:e;
    let dx=t.clientX-jOrigin.x, dy=t.clientY-jOrigin.y;
    const dist=Math.min(Math.sqrt(dx*dx+dy*dy),JR);
    const angle=Math.atan2(dy,dx);
    dx=Math.cos(angle)*dist; dy=Math.sin(angle)*dist;
    jThumb.style.transform=`translate(${dx}px,${dy}px)`;
    move.x=dx/JR; move.z=dy/JR;
  }
  function jEnd(){ jActive=false; jThumb.style.transform=''; move.x=0; move.z=0; }

  jBase.addEventListener('touchstart',jStart,{passive:true});
  jBase.addEventListener('touchmove',jMove,{passive:true});
  jBase.addEventListener('touchend',jEnd);
  jBase.addEventListener('mousedown',jStart);
  window.addEventListener('mousemove',e=>{if(jActive)jMove(e);});
  window.addEventListener('mouseup',jEnd);


  // ── Keyboard ──────────────────────────────────
  const keys={};
  window.addEventListener('keydown',e=>{keys[e.key]=true;syncKeys();});
  window.addEventListener('keyup',e=>{keys[e.key]=false;syncKeys();});
  function syncKeys(){
    move.z=(keys['ArrowUp']||keys['w']||keys['z'])?-1:(keys['ArrowDown']||keys['s'])?1:0;
    move.x=(keys['ArrowLeft']||keys['a']||keys['q'])?-.7:(keys['ArrowRight']||keys['d'])?.7:0;
    move.rotY=(keys['e'])?1:(keys['r'])?-1:0;
  }

  // ── Navigation du splash ─────────────────────
  $('btn-create').addEventListener('click', () => {
    roomId = genCode();
    renderArenaPicker();
    $('room-code-display').textContent = roomId;
    $('view-menu').style.display  = 'none';
    $('view-create').style.display = 'flex';
  });

  $('btn-show-join').addEventListener('click', () => {
    $('view-menu').style.display = 'none';
    $('view-join').style.display  = 'flex';
    setTimeout(() => $('code-input').focus(), 100);
  });

  $('btn-start-create').addEventListener('click', () => { isCreator = true; start(); });

  $('btn-start-join').addEventListener('click', () => {
    const code = $('code-input').value.trim().toUpperCase();
    if (code.length < 3) { $('code-input').style.borderColor='#ff4444'; return; }
    roomId = code;
    isCreator = false;
    start();
  });

  $('code-input').addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase();
    e.target.style.borderColor = '';
  });
  $('code-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('btn-start-join').click();
  });

  $('btn-back-create').addEventListener('click', () => {
    $('view-create').style.display = 'none';
    $('view-menu').style.display   = 'flex';
  });
  $('btn-back-join').addEventListener('click', () => {
    $('view-join').style.display = 'none';
    $('view-menu').style.display  = 'flex';
  });

  $('btn-customize').addEventListener('click', () => {
    $('view-menu').style.display      = 'none';
    $('view-customize').style.display = 'flex';
    requestAnimationFrame(() => {
      initCustomizer();
      if (custRenderer) {
        const box = $('cust-box');
        custRenderer.setSize(box.clientWidth, box.clientHeight);
        if (custCamera) { custCamera.aspect = box.clientWidth / box.clientHeight; custCamera.updateProjectionMatrix(); }
      }
    });
  });

  $('btn-back-cust').addEventListener('click', () => {
    $('view-customize').style.display = 'none';
    $('view-menu').style.display      = 'flex';
    custRunning = false;
  });

  function toggleLandscape() {
    landscapeMode = !landscapeMode;
    document.body.classList.toggle('ls', landscapeMode);
    const btn = $('btn-landscape');
    btn.classList.toggle('active', landscapeMode);
    btn.textContent = landscapeMode ? '↺ PORTRAIT' : '↺ PAYSAGE';
    // Réinitialiser la transition des barres de vie selon l'orientation
    [$('hp-fill-me'), $('hp-fill-enemy')].forEach(el => {
      if (el) el.style.transition = landscapeMode
        ? 'height .25s ease-out'
        : 'width .25s ease-out';
    });
    updateHPBars();
  }

  $('btn-landscape').addEventListener('click', toggleLandscape);
  $('btn-landscape').addEventListener('touchstart', e => { e.preventDefault(); toggleLandscape(); }, { passive: false });
  $('btn-attack').addEventListener('click', doAttack);
  $('btn-attack').addEventListener('touchstart', e => { e.preventDefault(); doAttack(); }, { passive: false });
  $('btn-reset-gyro').addEventListener('click', recenterGyro);
  $('btn-reset-gyro').addEventListener('touchstart', e => { e.preventDefault(); recenterGyro(); }, { passive: false });
  $('btn-invite-game').addEventListener('click', copyInvite);
  $('btn-quit-game').addEventListener('click', () => {
    if (confirm('Quitter la partie ?')) {
      if (roomId) db.ref('rooms/' + roomId + '/players/' + myId).remove();
      location.reload();
    }
  });

  // Service Worker

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/robot-ar/sw.js').catch(()=>{});
  }
  </script>
</body>
